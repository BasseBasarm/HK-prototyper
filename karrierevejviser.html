// ── Resultatmotor (uændret) ───────────────────────────────────────
function getResults(answers) {
  const { fagomraade, uddannelse, behov, erfaring } = answers;
  const results = { uddannelsesveje: [], overenskomst: [], tips: [], hurtiglinks: [] };

  if (behov === "videre" || behov === "skifte") {
    if (uddannelse === "ufaglaert") {
      results.uddannelsesveje.push(
        { title: "Kontoruddannelse (EUD)", duration: "2 år", desc: "Giver grundlag for administrativt arbejde. Mulighed for specialisering i offentlig administration, økonomi, kommunikation m.m.", fit: "Perfekt første skridt" },
        { title: "Handelsuddannelse (EUD)", duration: "2 år", desc: "Bred butiksrettet uddannelse med fokus på salg, kundeservice og detail.", fit: "God start i butik/handel" },
        { title: "Lægesekretæruddannelse", duration: "ca. 2 år", desc: "Uddannelse inden for sundhedsadministration. Kombinerer IT, kommunikation og sundhedsfaglig viden.", fit: "Stabil karrierevej i sundhed" }

        { title: "Diplomuddannelse i ledelse", duration: "2-3 år deltid", desc: "Fleksibel lederuddannelse du kan tage sideløbende med arbejde.", fit: "Lederambitioner" },
        { title: "HD 1. del + 2. del", duration: "2+2 år deltid", desc: "Anerkendt erhvervsøkonomisk uddannelse.", fit: "Karriereløft i økonomi" }
      );
    }
    if (uddannelse === "bachelor") {
      results.uddannelsesveje.push(
        { title: "Kandidatuddannelse (fx cand.soc. eller cand.merc.)", duration: "2 år", desc: "Specialisering. Åbner for lederstillinger og specialistroller.", fit: "Akademisk fordybelse" },
        { title: "Master i offentlig ledelse (MPG/MPA)", duration: "2 år deltid", desc: "For erfarne i offentlig sektor. Fokus på ledelse og strategi.", fit: "Topledelse i det offentlige" },
        { title: "Diplomuddannelse i projektledelse", duration: "1-2 år deltid", desc: "Praktisk lederuddannelse med fokus på projektledelse.", fit: "Projektleder-sporet" }
      );
    }
  }

  if (behov === "opkval") {
    if (fagomraade === "kontor") {
      results.uddannelsesveje.push(
        { title: "AMU-kurser i regnskab & bogføring", duration: "1-5 dage", desc: "Korte, intensive kurser. Ofte gratis via overenskomsten.", fit: "Hurtig opkvalificering" },
        { title: "Microsoft Office specialisering", duration: "1-3 dage", desc: "Bliv ekspert i Excel, Power BI eller andre Office-værktøjer.", fit: "Daglig effektivisering" },

    } else if (fagomraade === "handel") {

    } else if (fagomraade === "lab") {

    } else {

        { title: "AMU-kurser inden for dit felt", duration: "1-5 dage", desc: "Korte, praksisnære kurser.", fit: "Hurtig opkvalificering" },

  }

  if (behov === "loen") {
    results.tips.push(
      "Brug HK's lønstatistik til at finde gennemsnitslønnen for din stillingsbetegnelse.",

  if (behov === "jobsoeg") {
    results.tips.push(
      "Tilmeld dig HK JobBørs — her matcher vi kvalificerede kandidater med virksomheder.",
      "Brug HK's gratis CV- og ansøgningstjek, og få feedback fra en karrierevejleder.",

    );
  }

  if (fagomraade === "kontor" || fagomraade === "it" || fagomraade === "ledelse") {
    results.overenskomst.push(
      { title: "Selvvalgt uddannelse", desc: "Op til 2 ugers selvvalgt uddannelse om året under HK Privat's overenskomst." },
      { title: "Fritvalgskonto", desc: "Din fritvalgskonto kan bruges til at finansiere yderligere uddannelse." }

  }
  if (fagomraade === "handel") {

  if (fagomraade === "lab") {
    results.overenskomst.push(

      { title: "Selvvalgt uddannelse", desc: "Ret til selvvalgt uddannelse under HK Privats overenskomster." }
    );
  }

  results.hurtiglinks = [
    { label: "HK's gratis kurser (Upgrade)", url: "hk.dk/kurser" },
    { label: "Lønstatistik", url: "hk.dk/loenstatistik" },
    { label: "Book karrierevejledning", url: "hk.dk/karriere/karrieretelefonen" },
    { label: "HK JobBørs", url: "hk.dk/karriere/jobboers" },
    { label: "Selvvalgt uddannelse", url: "hk.dk/selvvalgtuddannelse" },
  ];

  if (erfaring === "0-2")  results.tips.push("Som relativt ny: Fokus på at opbygge netværk og få bred erfaring.");
  if (erfaring === "3-5")  results.tips.push("Med 3-5 års erfaring er det et godt tidspunkt at specialisere sig eller tage en overbygning.");
  if (erfaring === "6-10") results.tips.push("Med solid erfaring kan det være tid til at overveje ledelse eller specialisering.");
  if (erfaring === "10+")  results.tips.push("Din erfaring er guld værd. Overvej mentor-roller eller senior lønforhandling.");

  if (results.uddannelsesveje.length === 0 && behov !== "loen" && behov !== "jobsoeg") {
    results.uddannelsesveje.push(
      { title: "AMU-kurser inden for dit felt", duration: "1-5 dage", desc: "Korte, praksisnære kurser.", fit: "Hurtig opkvalificering" },
      { title: "HK's gratis onlinekurser (Upgrade)", duration: "Selvstudium", desc: "Gratis kurser i Excel, kommunikation, digitale værktøjer m.m.", fit: "Fleksibel læring" }
    );
  }

  return results;
}

// ── AI-kald ───────────────────────────────────────────────────────
async function spørKarriereAI(messages, answers) {
  const fag = FAGOMRAADER.find(f => f.id === answers.fagomraade);
  const udd = UDDANNELSER.find(u => u.id === answers.uddannelse);
  const beh = BEHOV.find(b => b.id === answers.behov);
  const erf = ERFARING.find(e => e.id === answers.erfaring);

  const systemPrompt = `Du er en erfaren karrierevejleder hos HK (den danske fagforening).

Profil på det medlem du vejleder:
- Fagområde: ${fag?.label} — ${fag?.desc}
- Uddannelse: ${udd?.label}
- Behov: ${beh?.label} — ${beh?.desc}
- Erfaring: ${erf?.label}

Regler:
- Svar ALTID på dansk i klart, empatisk hverdagssprog
- Hold svarene kortfattede (max 4-5 sætninger)
- Vær konkret og handlingsorienteret
- Henvis til HK's tilbud når relevant (lønstatistik, karrieretelefon, Upgrade-kurser)
- Stil gerne et opfølgende spørgsmål for at forstå situationen bedre`;

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, systemPrompt, maxTokens: 500 }),
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error || 'API fejl');
  return data.content;
}

// ── Komponenter ───────────────────────────────────────────────────
const HK_BLUE   = "#003B6F";
const HK_LIGHT  = "#E8F0FE";
const HK_ACCENT = "#0071CE";
const HK_GREEN  = "#2E8B57";

function ProgressBar({ step, total }) {
  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 32 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{ flex: 1, height: 6, borderRadius: 3, background: i <= step ? HK_ACCENT : "#D1D5DB", transition: "background 0.4s ease" }} />
      ))}
    </div>
  );
}

function OptionCard({ icon, label, desc, selected, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        display: "flex", alignItems: "center", gap: 14, width: "100%",
        padding: "14px 18px",
        border: selected ? `2px solid ${HK_ACCENT}` : "2px solid #E5E7EB",
        borderRadius: 12,
        background: selected ? HK_LIGHT : "#FFFFFF",
        cursor: "pointer", textAlign: "left", transition: "all 0.2s ease",

      }}

function ResultCard({ title, duration, desc, fit }) {
  return (
    <div style={{ padding: 18, border: "1px solid #E5E7EB", borderRadius: 12, background: "#FFF", marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 6 }}>
        <h4 style={{ margin: 0, color: HK_BLUE, fontSize: 16 }}>{title}</h4>
        {duration && (
          <span style={{ fontSize: 12, background: HK_LIGHT, color: HK_ACCENT, padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap", fontWeight: 600 }}>
            {duration}
          </span>

      <p style={{ margin: "6px 0", color: "#4B5563", fontSize: 14, lineHeight: 1.5 }}>{desc}</p>
      {fit && (
        <span style={{ fontSize: 12, color: HK_GREEN, fontWeight: 600, background: "#ECFDF5", padding: "2px 10px", borderRadius: 20 }}>{fit}</span>

}

// ── AI-chat komponent til resultatsiden ───────────────────────────
function KarriereChat({ answers }) {
  const [chat, setChat]       = React.useState([]);
  const [input, setInput]     = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const bundenRef = React.useRef(null);

  React.useEffect(() => {
    if (bundenRef.current) bundenRef.current.scrollIntoView({ behavior: "smooth" });
  }, [chat, loading]);

  async function send(tekst) {
    const q = tekst || input;
    if (!q.trim() || loading) return;

    const nyChat = [...chat, { role: "user", content: q }];
    setChat(nyChat);
    setInput("");
    setLoading(true);

    try {
      const messages = nyChat.map(m => ({ role: m.role, content: m.content }));
      const svar = await spørKarriereAI(messages, answers);
      setChat([...nyChat, { role: "assistant", content: svar }]);
    } catch {
      setChat([...nyChat, { role: "assistant", content: "Beklager, der opstod en teknisk fejl. Prøv igen om lidt." }]);
    }
    setLoading(false);
  }

  const eksempler = [
    "Hvad tjener folk typisk i mit felt?",
    "Hvordan forbereder jeg mig bedst til lønforhandling?",
    "Hvilke kurser anbefaler du som næste skridt?",
    "Hvordan skifter jeg branche med min baggrund?",
  ];

  return (
    <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 22, marginBottom: 28 }}>
      <h3 style={{ margin: "0 0 4px", fontSize: 18, color: HK_BLUE, fontWeight: 600 }}>
        💬 Stil vejlederen et spørgsmål
      </h3>
      <p style={{ margin: "0 0 16px", fontSize: 13, color: "#9CA3AF" }}>
        AI-vejlederen kender medlemmets profil og kan svare på opfølgende spørgsmål.
      </p>

      {chat.length === 0 && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
          {eksempler.map((ex, i) => (
            <button
              key={i}
              onClick={() => send(ex)}
              style={{ padding: "7px 13px", background: HK_LIGHT, border: "none", borderRadius: 20, fontSize: 12, color: HK_ACCENT, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}
            >
              {ex}
            </button>
          ))}
        </div>
      )}

      {chat.map((msg, i) => (
        <div key={i} style={{ marginBottom: 12, display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start" }}>
          <div style={{
            padding: "10px 14px",
            borderRadius: msg.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
            background: msg.role === "user" ? HK_ACCENT : "#F3F4F6",
            color: msg.role === "user" ? "#FFF" : "#1F2937",
            maxWidth: "80%", fontSize: 14, lineHeight: 1.6,
          }}>
            {msg.content}
          </div>
        </div>
      ))}

      {loading && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#9CA3AF", fontSize: 13, marginBottom: 12 }}>
          <div style={{ width: 14, height: 14, border: `2px solid ${HK_LIGHT}`, borderTopColor: HK_ACCENT, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          Henter svar...
        </div>
      )}

      <div ref={bundenRef} />

      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <input
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }}}
          disabled={loading}
          placeholder="Stil et spørgsmål om karrieremuligheder..."
          style={{ flex: 1, padding: "10px 14px", border: "1px solid #D1D5DB", borderRadius: 10, fontSize: 13, fontFamily: "inherit", outline: "none", background: loading ? "#F9FAFB" : "#FFF" }}
        />
        <button
          onClick={() => send()}
          disabled={!input.trim() || loading}
          style={{ padding: "10px 18px", background: (input.trim() && !loading) ? HK_ACCENT : "#D1D5DB", color: "#FFF", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: (input.trim() && !loading) ? "pointer" : "default", fontFamily: "inherit" }}
        >
          {loading ? "..." : "Spørg →"}
        </button>
      </div>
    </div>
  );
}

// ── Hovedapplikation ──────────────────────────────────────────────
function KarriereVejviser() {
  const [step, setStep]           = React.useState(-1);
  const [answers, setAnswers]     = React.useState({});
  const [showReveal, setShowReveal] = React.useState(false);
  const [fadeIn, setFadeIn]       = React.useState(true);
  const totalSteps = 4;

  React.useEffect(() => {
    setFadeIn(false);
    const t = setTimeout(() => setFadeIn(true), 50);
    return () => clearTimeout(t);
  }, [step]);

  function select(key, value) {
    setAnswers(prev => ({ ...prev, [key]: value }));
    setTimeout(() => setStep(s => s + 1), 300);
  }

  function reset() {
    setStep(-1);
    setAnswers({});
    setShowReveal(false);
  }

  const results = step >= totalSteps ? getResults(answers) : null;

  // ── Splash ──
  if (step === -1) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(135deg, ${HK_BLUE} 0%, #005A9E 100%)`, fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif", padding: 20 }}>
        <div style={{ textAlign: "center", color: "#FFF", maxWidth: 520, animation: "fadeUp 0.8s ease-out" }}>
          <div style={{ fontSize: 54, marginBottom: 16 }}>🧭</div>
          <h1 style={{ fontSize: 34, fontWeight: 700, margin: "0 0 12px", lineHeight: 1.2 }}>HK Karrierevejviser</h1>
          <p style={{ fontSize: 17, opacity: 0.9, lineHeight: 1.6, marginBottom: 8 }}>Et interaktivt værktøj til Karrieretelefonens vejledere</p>
          <p style={{ fontSize: 14, opacity: 0.7, lineHeight: 1.6, marginBottom: 32 }}>
            Stil spørgsmål. Klik af. Få overblik over medlemmets muligheder — plus en AI-vejleder til opfølgende spørgsmål.
          </p>
          <button
            onClick={() => setStep(0)}
            style={{ padding: "14px 40px", fontSize: 17, fontWeight: 600, color: HK_BLUE, background: "#FFF", border: "none", borderRadius: 30, cursor: "pointer", boxShadow: "0 4px 20px rgba(0,0,0,0.15)", fontFamily: "inherit" }}
            onMouseEnter={e => (e.target.style.transform = "scale(1.04)")}
            onMouseLeave={e => (e.target.style.transform = "scale(1)")}
          >
            Start vejledning →
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#F3F4F6", fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif" }}>

      {/* Header */}
      <div style={{ background: HK_BLUE, color: "#FFF", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>🧭</span>
          <span style={{ fontWeight: 700, fontSize: 17 }}>HK Karrierevejviser</span>
        </div>
        <button onClick={reset} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#FFF", padding: "6px 16px", borderRadius: 20, cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
          Ny samtale
        </button>
      </div>

      {/* Indhold */}
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "28px 20px 40px", opacity: fadeIn ? 1 : 0, transform: fadeIn ? "translateY(0)" : "translateY(12px)", transition: "all 0.35s ease" }}>

        {step < totalSteps && <ProgressBar step={step} total={totalSteps} />}

        {/* Step 0 */}
        {step === 0 && (
          <>
            <h2 style={{ color: HK_BLUE, fontSize: 22, marginBottom: 6 }}>Hvilket fagområde?</h2>
            <p style={{ color: "#6B7280", marginBottom: 20, fontSize: 14 }}>Spørg medlemmet: "Hvad arbejder du med til daglig?"</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {FAGOMRAADER.map(f => <OptionCard key={f.id} icon={f.icon} label={f.label} desc={f.desc} selected={answers.fagomraade === f.id} onClick={() => select("fagomraade", f.id)} />)}
            </div>
          </>
        )}

        {/* Step 1 */}
        {step === 1 && (
          <>
            <h2 style={{ color: HK_BLUE, fontSize: 22, marginBottom: 6 }}>Uddannelsesbaggrund?</h2>
            <p style={{ color: "#6B7280", marginBottom: 20, fontSize: 14 }}>Spørg: "Hvilken uddannelse har du som baggrund?"</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {UDDANNELSER.map(u => <OptionCard key={u.id} icon={u.icon} label={u.label} selected={answers.uddannelse === u.id} onClick={() => select("uddannelse", u.id)} />)}
            </div>
          </>
        )}

        {/* Step 2 */}
        {step === 2 && (
          <>
            <h2 style={{ color: HK_BLUE, fontSize: 22, marginBottom: 6 }}>Hvad søger medlemmet?</h2>
            <p style={{ color: "#6B7280", marginBottom: 20, fontSize: 14 }}>Spørg: "Hvad drømmer du om — hvad vil du gerne opnå?"</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {BEHOV.map(b => <OptionCard key={b.id} icon={b.icon} label={b.label} desc={b.desc} selected={answers.behov === b.id} onClick={() => select("behov", b.id)} />)}
            </div>
          </>
        )}

        {/* Step 3 */}
        {step === 3 && (
          <>
            <h2 style={{ color: HK_BLUE, fontSize: 22, marginBottom: 6 }}>Hvor lang erfaring?</h2>
            <p style={{ color: "#6B7280", marginBottom: 20, fontSize: 14 }}>Spørg: "Hvor mange år har du arbejdet inden for dit felt?"</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {ERFARING.map(e => <OptionCard key={e.id} icon={e.icon} label={e.label} selected={answers.erfaring === e.id} onClick={() => select("erfaring", e.id)} />)}
            </div>
          </>
        )}

        {/* Resultater */}
        {step >= totalSteps && results && (
          <>
            <div style={{ background: `linear-gradient(135deg, ${HK_BLUE}, #005A9E)`, color: "#FFF", padding: 24, borderRadius: 16, marginBottom: 24 }}>
              <h2 style={{ margin: "0 0 8px", fontSize: 22 }}>📋 Vejledningsoverblik</h2>
              <p style={{ margin: 0, opacity: 0.9, fontSize: 14, lineHeight: 1.5 }}>
                Profil: <strong>{FAGOMRAADER.find(f => f.id === answers.fagomraade)?.label}</strong>,{" "}
                <strong>{UDDANNELSER.find(u => u.id === answers.uddannelse)?.label}</strong>,{" "}
                <strong>{ERFARING.find(e => e.id === answers.erfaring)?.label} erfaring</strong>
              </p>
            </div>

            {results.uddannelsesveje.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <h3 style={{ color: HK_BLUE, fontSize: 18, marginBottom: 12 }}>🎓 Uddannelsesveje & kurser</h3>
                {results.uddannelsesveje.map((u, i) => <ResultCard key={i} {...u} />)}
              </div>
            )}

            {results.overenskomst.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <h3 style={{ color: HK_BLUE, fontSize: 18, marginBottom: 12 }}>📜 Overenskomstrettigheder</h3>
                {results.overenskomst.map((o, i) => (
                  <div key={i} style={{ padding: 16, background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 12, marginBottom: 8 }}>
                    <h4 style={{ margin: "0 0 4px", color: "#92400E", fontSize: 15 }}>{o.title}</h4>
                    <p style={{ margin: 0, color: "#78350F", fontSize: 13, lineHeight: 1.5 }}>{o.desc}</p>
                  </div>
                ))}
              </div>
            )}

            {results.tips.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <h3 style={{ color: HK_BLUE, fontSize: 18, marginBottom: 12 }}>💡 Tips til samtalen</h3>
                <div style={{ background: "#FFF", borderRadius: 12, padding: 18, border: "1px solid #E5E7EB" }}>
                  {results.tips.map((tip, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, marginBottom: i < results.tips.length - 1 ? 12 : 0 }}>
                      <span style={{ color: HK_ACCENT, fontWeight: 700, flexShrink: 0 }}>→</span>
                      <span style={{ color: "#374151", fontSize: 14, lineHeight: 1.5 }}>{tip}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {results.hurtiglinks.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <h3 style={{ color: HK_BLUE, fontSize: 18, marginBottom: 12 }}>🔗 Nyttige links</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {results.hurtiglinks.map((link, i) => (
                    <div key={i} style={{ padding: "12px 14px", background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 10, fontSize: 13, color: HK_ACCENT, fontWeight: 600 }}>
                      {link.label}
                      <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 400, marginTop: 2 }}>{link.url}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* AI-chat */}
            <KarriereChat answers={answers} />

            {/* CTA */}
            <div style={{ display: "flex", gap: 10, marginBottom: 40 }}>
              <button onClick={reset} style={{ flex: 1, padding: "13px 20px", background: HK_ACCENT, color: "#FFF", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                🔄 Ny samtale
              </button>
              <button onClick={() => setShowReveal(true)} style={{ flex: 1, padding: "13px 20px", background: "#FFF", color: HK_BLUE, border: `2px solid ${HK_BLUE}`, borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                ℹ️ Om dette værktøj
              </button>
            </div>

            {/* Reveal */}
            {showReveal && (
              <div style={{ background: `linear-gradient(135deg, ${HK_BLUE} 0%, #1a4a7a 100%)`, color: "#FFF", borderRadius: 20, padding: 32, marginBottom: 40, animation: "fadeUp 0.6s ease-out" }}>
                <div style={{ textAlign: "center", marginBottom: 20 }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>👋</div>
                  <h2 style={{ margin: "0 0 8px", fontSize: 26 }}>Hej — jeg hedder Bastian</h2>
                  <p style={{ opacity: 0.85, fontSize: 15, lineHeight: 1.6, maxWidth: 440, margin: "0 auto" }}>
                    Og dette værktøj er min uopfordrede ansøgning til jer.
                  </p>
                </div>
                <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 14, padding: 22, marginBottom: 20 }}>
                  <h3 style={{ margin: "0 0 12px", fontSize: 17 }}>Hvorfor lavede jeg det her?</h3>
                  <p style={{ margin: "0 0 12px", fontSize: 14, lineHeight: 1.7, opacity: 0.95 }}>
                    Fordi jeg tror på, at den bedste ansøgning ikke er et brev om hvad jeg <em>kunne</em> gøre — men en demonstration af, hvad jeg <em>gør</em>.
                  </p>
                  <p style={{ margin: 0, fontSize: 14, lineHeight: 1.7, opacity: 0.95 }}>
                    Jeg er kreativ konceptudvikler og tekstforfatter med baggrund i bureaubranchen. Jeg identificerer problemer og omsætter dem til løsninger, der fungerer.
                  </p>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ display: "inline-block", background: "#FFF", color: HK_BLUE, padding: "14px 28px", borderRadius: 12, fontWeight: 700, fontSize: 16 }}>
                    📧 bastiankjar@gmail.com
                  </div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KarriereVejviser));
</script>
</body>
</html>
