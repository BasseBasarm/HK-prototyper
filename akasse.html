<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK A-kasse Rådgiver</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<a href="index.html" style="display:block;padding:8px 20px;background:#003B6F;color:rgba(255,255,255,0.7);font-family:system-ui,sans-serif;font-size:13px;text-decoration:none;font-weight:500;">← Alle koncepter</a>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

// ── Farver ────────────────────────────────────────────────────────
const HK_BLUE   = "#003B6F";
const HK_ACCENT = "#0071CE";
const HK_GREEN  = "#2E8B57";
const HK_RED    = "#E94560";
const HK_WARN   = "#F39C12";

// ── A-kasse jargon-database ───────────────────────────────────────
const JARGON = {
  "dagpengeperiode":     { forklaring: "de 2 år du har ret til dagpenge (inden for en 3-årig periode)", alvorlighed: "høj" },
  "referenceperiode":    { forklaring: "den 3-årige periode inden for hvilken du kan bruge dine 2 års dagpengeret", alvorlighed: "høj" },
  "genoptjening":        { forklaring: "at optjene ret til en ny dagpengeperiode ved at arbejde 1.924 timer (svarende til 1 års fuldtidsarbejde)", alvorlighed: "høj" },
  "karensdag":           { forklaring: "én dag hver 4. måned hvor du ikke får dagpenge (undgås hvis du har arbejdet mere end 148 timer i perioden)", alvorlighed: "høj" },
  "karensmåned":         { forklaring: "den første måned efter endt uddannelse, hvor nyuddannede ikke kan modtage dagpenge", alvorlighed: "høj" },
  "rådighedsforpligtelse": { forklaring: "kravet om at du aktivt søger arbejde og kan tiltræde et job med én dags varsel", alvorlighed: "høj" },
  "rådighed":            { forklaring: "at du står til rådighed for arbejdsmarkedet: søger job, kan starte med kort varsel, møder op til samtaler", alvorlighed: "høj" },
  "beskæftigelseskrav":  { forklaring: "det antal timer du skal have arbejdet for at få ret til dagpenge (1.924 timer inden for 3 år)", alvorlighed: "høj" },
  "supplerende dagpenge":{ forklaring: "dagpenge du kan få hvis du arbejder på nedsat tid (under 37 timer/uge)", alvorlighed: "middel" },
  "feriedagpenge":       { forklaring: "dagpenge du kan få under ferie, hvis du ikke har optjent feriepenge nok", alvorlighed: "middel" },
  "dimittend":           { forklaring: "nyuddannet person der søger dagpenge efter endt uddannelse", alvorlighed: "middel" },
  "dimittendsats":       { forklaring: "den lavere dagpengesats nyuddannede får (ca. 82% af højeste sats i de første 3 måneder, derefter ca. 71%)", alvorlighed: "middel" },
  "dagpengesats":        { forklaring: "det beløb du får udbetalt i dagpenge pr. måned (max ca. 19.800 kr./md. i 2026 før skat)", alvorlighed: "middel" },
  "g-dage":              { forklaring: "ledighedsdage din tidligere arbejdsgiver skal betale for (de første 2 dage efter opsigelse)", alvorlighed: "middel" },
  "ydelseskort":         { forklaring: "det kort/den oversigt du udfylder for at få dagpenge udbetalt (registrerer timer, sygdom, ferie)", alvorlighed: "middel" },
  "selvforskyldt ledig": { forklaring: "at du selv har opsagt dit job eller er blevet fyret pga. din egen adfærd (udløser 3 ugers karantæne)", alvorlighed: "høj" },
  "karantæne":           { forklaring: "en periode (typisk 3 uger) hvor du ikke kan få dagpenge, fx fordi du selv opsagde dit job", alvorlighed: "høj" },
  "efterløn":            { forklaring: "en ordning der giver dig mulighed for at trække dig fra arbejdsmarkedet før folkepensionsalderen", alvorlighed: "middel" },
};

function analyserSvarForJargon(tekst) {
  const lower = tekst.toLowerCase();
  const fundne = [];
  for (const [term, data] of Object.entries(JARGON)) {
    if (lower.includes(term.toLowerCase())) {
      fundne.push({ term, ...data });
    }
  }
  fundne.sort((a, b) => ({ "høj": 0, "middel": 1, "lav": 2 }[a.alvorlighed] - { "høj": 0, "middel": 1, "lav": 2 }[b.alvorlighed]));
  return fundne;
}

// ── Situationsdetektion (hurtig regex til sidebar) ────────────────
function detektérSituation(tekst) {
  const t = tekst.toLowerCase();
  const situationer = [];
  if (/ledig|fyret|opsagt|fritstil|mistet.*job|arbejdsløs/i.test(t) && !/selv.*sagt.*op|opsagt.*selv/i.test(t)) situationer.push({ id: "netopledig",   label: "Netop ledig",      icon: "📋", color: HK_RED });
  if (/selv.*sagt.*op|opsagt.*selv|sige.*op|frivillig.*opsig/i.test(t)) situationer.push({ id: "selvopsagt",   label: "Sagt op selv",     icon: "🚪", color: "#8E44AD" });
  if (/nyuddann|dimittend|færdig.*uddannel|bestået.*eksamen/i.test(t)) situationer.push({ id: "nyuddannet",  label: "Nyuddannet",       icon: "🎓", color: HK_ACCENT });
  if (/supplerende|deltid|nedsat tid|få timer/i.test(t))               situationer.push({ id: "supplerende",  label: "Deltidsarbejde",   icon: "⏰", color: HK_WARN });
  if (/ferie.*dagpeng|feriedagpeng|holde.*ferie.*ledig/i.test(t))      situationer.push({ id: "ferie",        label: "Ferie under ledighed", icon: "🌴", color: HK_GREEN });
  if (/syg.*ledig|syg.*dagpeng|sygemeldt.*ledig/i.test(t))             situationer.push({ id: "sygdom",       label: "Syg under ledighed", icon: "🤒", color: "#C0392B" });
  if (/barsel.*ledig|gravid.*ledig|fødsel.*dagpeng/i.test(t))          situationer.push({ id: "barsel",       label: "Barsel under ledighed", icon: "👶", color: "#8E44AD" });
  if (/løbe.*ud|genoptjen|mist.*dagpeng|udløb.*dagpeng/i.test(t))      situationer.push({ id: "genoptjening", label: "Dagpengene udløber", icon: "⏳", color: HK_RED });
  if (/efterløn|tidlig.*pension|trække.*tilbage/i.test(t))             situationer.push({ id: "efterloen",    label: "Efterløn",         icon: "🌅", color: "#2980B9" });
  if (situationer.length === 0) situationer.push({ id: "generel", label: "Generel henvendelse", icon: "📬", color: "#6B7280" });
  return situationer;
}

function findNavn(tekst) {
  const mønstre = [
    /(?:venlig hilsen|mvh|hilsen|vh|med venlig hilsen)[,.\s\n\r]+([A-ZÆØÅ][a-zæøåé]+)/i,
    /(?:^|\n)([A-ZÆØÅ][a-zæøåé]+)\s*$/m,
  ];
  const stop = ["hej","tak","kære","og","den","det","med","fra","til","jeg","min","mit","mine","hvis","kan","vil","har","var","men","som","der","for","ved"];
  for (const m of mønstre) {
    const match = tekst.match(m);
    if (match && match[1] && !stop.includes(match[1].toLowerCase()) && match[1].length > 1) {
      return match[1].trim();
    }
  }
  return null;
}

// ── Kald AI ───────────────────────────────────────────────────────
async function genererAISvar(mailTekst, navn, situationer) {
  const situationsLabels = situationer.map(s => s.label).join(", ");

  const systemPrompt = `Du er en erfaren HK a-kasse rådgiver. Du hjælper kolleger med at besvare henvendelser fra medlemmer.

Dine regler:
- Svar ALTID på dansk i klart, venligt hverdagssprog
- Brug ALDRIG a-kasse jargon uden forklaring: dagpengeperiode, referenceperiode, genoptjening, karensdag, rådighedsforpligtelse, beskæftigelseskrav, ydelseskort, g-dage, dimittendsats
- Giv konkrete tal og frister (max dagpengesats i 2026: ca. 19.800 kr./md. før skat)
- Hold svaret på max 150 ord
- Brug et venligt "Hej [navn]" som indledning
- Afslut ALTID med ét konkret næste skridt for medlemmet
- Hvis situationen kræver det: opfordr til at ringe på 7011 4545

Detekteret situation: ${situationsLabels}
Medlemmets navn: ${navn || "ukendt"}`;

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: "user", content: `Her er medlemmets mail:\n\n${mailTekst}` }],
      systemPrompt,
      maxTokens: 500,
    }),
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error || 'API fejl');
  return data.content;
}

// ── Komponenter ───────────────────────────────────────────────────
function AnalyseTag({ label, color }) {
  return (
    <span style={{ fontSize: 11, background: `${color}15`, color, padding: "3px 10px", borderRadius: 20, fontWeight: 600 }}>
      {label}
    </span>
  );
}

// ── Hovedapplikation ──────────────────────────────────────────────
function AkasseRaadgiver() {
  const [mailTekst, setMailTekst]   = React.useState("");
  const [navn, setNavn]             = React.useState(null);
  const [situationer, setSituationer] = React.useState([]);
  const [aiSvar, setAiSvar]         = React.useState(null);
  const [loadingAnalyse, setLoadingAnalyse] = React.useState(false);
  const [loadingAI, setLoadingAI]   = React.useState(false);
  const [fejl, setFejl]             = React.useState(null);
  const [svarTekst, setSvarTekst]   = React.useState("");
  const [jargonFund, setJargonFund] = React.useState([]);
  const [checkedItems, setCheckedItems] = React.useState({});
  const [vist, setVist]             = React.useState(false);

  function handleReset() {
    setMailTekst(""); setNavn(null); setSituationer([]);
    setAiSvar(null); setFejl(null); setSvarTekst([]);
    setJargonFund([]); setCheckedItems({}); setVist(false);
  }

  async function handleAnalyser() {
    if (!mailTekst.trim()) return;
    setLoadingAnalyse(true);
    setLoadingAI(true);
    setAiSvar(null);
    setFejl(null);
    setCheckedItems({});
    setSvarTekst("");
    setJargonFund([]);

    // Hurtig lokal analyse
    const detNavn = findNavn(mailTekst);
    const detSit  = detektérSituation(mailTekst);
    setNavn(detNavn);
    setSituationer(detSit);
    setVist(true);
    setLoadingAnalyse(false);

    // AI-svar asynkront
    try {
      const svar = await genererAISvar(mailTekst, detNavn, detSit);
      setAiSvar(svar);
    } catch (err) {
      setFejl("Kunne ikke hente AI-svar. Tjek at API-nøglen er sat korrekt i Vercel.");
    }
    setLoadingAI(false);
  }

  function handleTjekSvar() {
    setJargonFund(analyserSvarForJargon(svarTekst));
  }

  function toggleCheck(key) {
    setCheckedItems(prev => ({ ...prev, [key]: !prev[key] }));
  }

  return (
    <div style={{ minHeight: "100vh", background: "#ECEEF1", fontFamily: "system-ui, -apple-system, sans-serif" }}>

      {/* Header */}
      <div style={{ background: HK_BLUE, color: "#FFF", padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>📋</span>
          <span style={{ fontWeight: 700, fontSize: 16 }}>HK A-kasse Rådgiver</span>
          <span style={{ fontSize: 10, background: HK_RED, color: "#FFF", padding: "2px 8px", borderRadius: 10, fontWeight: 600, marginLeft: 4 }}>LIVE AI</span>
        </div>
        {vist && (
          <button onClick={handleReset} style={{ background: "rgba(255,255,255,0.12)", border: "none", color: "#FFF", padding: "5px 14px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
            Ny henvendelse
          </button>
        )}
      </div>

      {/* Mailindtastning */}
      {!vist && (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 20px" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <h1 style={{ fontSize: 24, color: "#1A1A2E", fontWeight: 600, margin: "0 0 8px" }}>Indsæt medlemmets mail</h1>
            <p style={{ fontSize: 14, color: "#6B7280", margin: 0, lineHeight: 1.5 }}>
              AI'en analyserer indholdet og skriver et klart svar — uden a-kasse-jargon.
            </p>
          </div>
          <div style={{ background: "#FFF", borderRadius: 16, border: "1px solid #D1D5DB", overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <textarea
              value={mailTekst}
              onChange={e => setMailTekst(e.target.value)}
              placeholder={"Indsæt medlemmets mail her...\n\nEksempel:\n\"Hej. Jeg er lige blevet fyret og ved ikke hvad jeg skal gøre. Hvornår kan jeg få dagpenge og hvor meget?\n\nLone\""}
              style={{ width: "100%", minHeight: 220, padding: 20, border: "none", fontSize: 14, lineHeight: 1.7, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", color: "#1F2937", outline: "none" }}
            />
            <div style={{ padding: "12px 20px", borderTop: "1px solid #F3F4F6", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#9CA3AF" }}>{mailTekst.length > 0 ? `${mailTekst.length} tegn` : ""}</span>
              <button
                onClick={handleAnalyser}
                disabled={!mailTekst.trim() || loadingAnalyse}
                style={{ padding: "10px 28px", background: mailTekst.trim() ? HK_BLUE : "#D1D5DB", color: "#FFF", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: mailTekst.trim() ? "pointer" : "default", fontFamily: "inherit" }}
              >
                {loadingAnalyse ? "Analyserer..." : "Analysér mail →"}
              </button>
            </div>
          </div>

          {/* Eksempler */}
          <div style={{ marginTop: 20 }}>
            <p style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 8 }}>Prøv med et eksempel:</p>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {[
                { label: "Netop ledig", tekst: "Hej HK. Jeg er lige blevet fyret fra mit job i Bilka. Hvad skal jeg gøre nu? Hvornår kan jeg få dagpenge og hvor meget får jeg?\n\nLone Hansen\nTlf: 28 45 92 11" },
                { label: "Sagt op selv", tekst: "Hej. Jeg har selv sagt mit job op fordi jeg ikke kunne holde det ud mere. Kan jeg stadig få dagpenge? Jeg er bange for at jeg slet ikke kan få noget.\n\nMikkel" },
                { label: "Nyuddannet", tekst: "Hejsa. Jeg er lige blevet færdig med min uddannelse som kontorassistent og har meldt mig ind i HK. Hvornår kan jeg begynde at få dagpenge?\n\nSara" },
                { label: "Deltidsarbejde", tekst: "Hej. Jeg arbejder kun 20 timer om ugen lige nu. Kan jeg få noget fra a-kassen oveni? Og hvor længe?\n\nThomas" },
              ].map((ex, i) => (
                <button
                  key={i}
                  onClick={() => setMailTekst(ex.tekst)}
                  style={{ padding: "6px 14px", background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 8, fontSize: 12, color: HK_ACCENT, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}
                >
                  {ex.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Analyseresultat */}
      {vist && (
        <div style={{ display: "flex", maxWidth: 1140, margin: "0 auto", gap: 20, padding: "20px 16px", alignItems: "start" }}>

          {/* Venstre sidebar */}
          <div style={{ width: 340, flexShrink: 0 }}>
            <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Medlemmets mail</div>
              <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 180, overflowY: "auto" }}>{mailTekst}</div>
            </div>

            <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Analyse</div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 4 }}>Navn</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: navn ? HK_GREEN : HK_RED }}>{navn || "Ikke fundet"}</div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 6 }}>Situation</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {situationer.map((s, i) => <AnalyseTag key={i} label={`${s.icon} ${s.label}`} color={s.color} />)}
                </div>
              </div>
            </div>

            {/* Jargon-tjek */}
            <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18, marginBottom: 14 }}>
              <h4 style={{ margin: "0 0 10px", fontSize: 11, color: "#6B7280", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Skriv dit svar og tjek for jargon</h4>
              <textarea
                value={svarTekst}
                onChange={e => { setSvarTekst(e.target.value); setJargonFund([]); }}
                placeholder="Skriv dit eget svar og tjek for a-kasse-jargon..."
                style={{ width: "100%", minHeight: 100, padding: 12, border: "1px solid #E5E7EB", borderRadius: 10, fontSize: 13, lineHeight: 1.6, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", outline: "none" }}
              />
              <button
                onClick={handleTjekSvar}
                disabled={!svarTekst.trim()}
                style={{ marginTop: 8, padding: "7px 16px", background: svarTekst.trim() ? HK_WARN : "#D1D5DB", color: "#FFF", border: "none", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: svarTekst.trim() ? "pointer" : "default", fontFamily: "inherit" }}
              >
                Tjek for jargon
              </button>
              {jargonFund.length > 0 && (
                <div style={{ marginTop: 10, padding: 12, background: `${HK_RED}06`, border: `1px solid ${HK_RED}20`, borderRadius: 10 }}>
                  <div style={{ fontSize: 11, color: HK_RED, fontWeight: 700, marginBottom: 8 }}>{jargonFund.length} fagudtryk fundet:</div>
                  {jargonFund.map((j, i) => (
                    <div key={i} style={{ marginBottom: 6 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: "#1A1A2E" }}>"{j.term}"</span>
                      <div style={{ fontSize: 11, color: "#4B5563", marginTop: 1 }}>→ <em>"{j.forklaring}"</em></div>
                    </div>
                  ))}
                </div>
              )}
              {jargonFund.length === 0 && svarTekst.length > 20 && (
                <div style={{ marginTop: 10, padding: 10, background: `${HK_GREEN}08`, border: `1px solid ${HK_GREEN}20`, borderRadius: 10, fontSize: 12, color: HK_GREEN, fontWeight: 600 }}>
                  ✓ Ingen a-kasse-jargon fundet!
                </div>
              )}
            </div>

            {/* Kvalitetstjek */}
            <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 18 }}>
              <h4 style={{ margin: "0 0 10px", fontSize: 11, color: "#6B7280", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Kvalitetstjek</h4>
              {[
                `Bruger du "${navn || "???"}" og ikke et andet navn?`,
                "Besvarer du det konkrete spørgsmål med konkrete tal?",
                "Er a-kasse-jargon forklaret i hverdagssprog?",
                "Afslutter du med ét klart næste skridt?",
                "Er Jobnet.dk nævnt, hvis det er relevant?",
              ].map((item, i) => (
                <label key={i} style={{ display: "flex", gap: 10, alignItems: "start", marginBottom: 7, fontSize: 12, color: "#374151", cursor: "pointer" }}>
                  <input type="checkbox" checked={!!checkedItems[i]} onChange={() => toggleCheck(i)} style={{ marginTop: 2, accentColor: HK_GREEN }} />
                  <span style={{ textDecoration: checkedItems[i] ? "line-through" : "none", opacity: checkedItems[i] ? 0.5 : 1 }}>{item}</span>
                </label>
              ))}
            </div>
          </div>

          {/* Højre: AI-svar */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 14, padding: 24, marginBottom: 14 }}>
              <h2 style={{ margin: "0 0 4px", fontSize: 18, color: "#1A1A2E", fontWeight: 600 }}>
                AI-genereret svarforslag
              </h2>
              <p style={{ margin: "0 0 16px", fontSize: 13, color: "#9CA3AF" }}>
                Brug det som udgangspunkt — tilpas og send som dit eget.
              </p>

              {loadingAI && (
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "20px 0", color: "#9CA3AF", fontSize: 14 }}>
                  <div style={{
                    width: 16, height: 16, border: `2px solid ${HK_LIGHT}`,
                    borderTopColor: HK_ACCENT, borderRadius: "50%",
                    animation: "spin 0.8s linear infinite", flexShrink: 0,
                  }} />
                  AI skriver svar...
                </div>
              )}

              {fejl && (
                <div style={{ padding: 16, background: `${HK_RED}08`, border: `1px solid ${HK_RED}20`, borderRadius: 10, fontSize: 13, color: HK_RED }}>
                  ⚠️ {fejl}
                </div>
              )}

              {aiSvar && !loadingAI && (
                <div style={{ background: "#F9FAFB", borderRadius: 12, padding: 20, border: "1px solid #E5E7EB" }}>
                  <div style={{ fontSize: 14, color: "#1F2937", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>
                    {aiSvar}
                  </div>
                  <div style={{ marginTop: 16, display: "flex", gap: 8 }}>
                    <button
                      onClick={() => { navigator.clipboard.writeText(aiSvar); }}
                      style={{ padding: "7px 14px", background: HK_BLUE, color: "#FFF", border: "none", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
                    >
                      📋 Kopiér svar
                    </button>
                    <button
                      onClick={handleAnalyser}
                      style={{ padding: "7px 14px", background: "#FFF", color: HK_ACCENT, border: `1px solid ${HK_ACCENT}`, borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
                    >
                      🔄 Generér nyt
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* Links */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {["jobnet.dk", "hk.dk/akasse/dagpenge", "borger.dk"].map((link, i) => (
                <div key={i} style={{ padding: "6px 12px", background: "#FFF", border: "1px solid #E5E7EB", borderRadius: 8, fontSize: 11, color: HK_ACCENT, fontWeight: 600 }}>
                  🔗 {link}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AkasseRaadgiver));
</script>
</body>
</html>
