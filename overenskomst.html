<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tal med din overenskomst</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<a href="index.html" style="display:block;padding:8px 20px;background:#003B6F;color:rgba(255,255,255,0.7);font-family:system-ui,sans-serif;font-size:13px;text-decoration:none;font-weight:500;">← Alle koncepter</a>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

// ── Farver ────────────────────────────────────────────────────────
const HK_BLUE   = "#003B6F";
const HK_ACCENT = "#0071CE";
const HK_LIGHT  = "#E8F0FE";

// ── Sektorer ──────────────────────────────────────────────────────
const SEKTORER = [
  { id: "handel",    label: "HK Handel",    icon: "🛒", desc: "Butik, kontor og lager i detailhandlen" },
  { id: "privat",    label: "HK Privat",    icon: "🏢", desc: "Kontor, IT, administration i den private sektor" },
  { id: "kommunal",  label: "HK Kommunal",  icon: "🏛️", desc: "Ansat i kommune eller region" },
  { id: "stat",      label: "HK Stat",      icon: "⚖️", desc: "Ansat i staten" },
];

// ── Eksempelspørgsmål per sektor ──────────────────────────────────
const EKSEMPLER = {
  handel:   ["Hvad er mindstelønnen for butiksassistenter?", "Har jeg ret til fri når mit barn er sygt?", "Hvad er Fritvalgskontoen?", "Hvornår stiger lønnen?"],
  privat:   ["Hvad er mit opsigelsesvarsel?", "Hvad har jeg ret til under barsel?", "Hvad er mine rettigheder ved sygdom?", "Hvad kan jeg bruge Fritvalgskontoen til?"],
  kommunal: ["Hvor mange feriedage har jeg?", "Hvad er mit pensionsbidrag?", "Hvad sker der hvis jeg er syg i lang tid?", "Hvad er mine uddannelsesrettigheder?"],
  stat:     ["Hvad er mine barselsrettigheder?", "Hvad er reglerne for overarbejde?", "Hvad er mit opsigelsesvarsel?", "Hvad har jeg ret til ved sygdom?"],
};

// ── Kald til vores API-mellemmand ─────────────────────────────────
async function spørAI(messages, sektor) {
  const systemPrompt = `Du er en hjælpsom assistent fra HK (den danske fagforening). Du hjælper HK-medlemmer med at forstå deres rettigheder og overenskomst.

Den valgte sektor er: ${sektor.label} — ${sektor.desc}.

Regler for dine svar:
- Svar ALTID på dansk i klart hverdagssprog
- Hold svarene kortfattede (max 4-5 sætninger)
- Brug aldrig fagtermer uden at forklare dem
- Vær konkret — giv tal og frister når det er relevant
- Afslut med "Kontakt HK på 7011 4545 for personlig rådgivning" ved komplicerede eller personlige situationer
- Hvis du er i tvivl om noget, sig det ærligt frem for at gætte

Du har dyb viden om HK's overenskomster: Butiksoverenskomsten 2025-2028, HK Privat's overenskomst, den kommunale overenskomst og den statslige overenskomst.`;

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, systemPrompt, maxTokens: 600 }),
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error || 'API fejl');
  return data.content;
}

// ── Komponenter ───────────────────────────────────────────────────
function SektorPille({ sektor, selected, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        display: "flex", alignItems: "center", gap: 8,
        padding: "8px 16px",
        border: selected ? `2px solid ${HK_ACCENT}` : "1px solid #D1D5DB",
        borderRadius: 30,
        background: selected ? HK_LIGHT : "#FFF",
        cursor: "pointer", fontSize: 13,
        fontWeight: selected ? 600 : 400,
        color: selected ? HK_BLUE : "#374151",
        fontFamily: "system-ui, sans-serif",
        transition: "all 0.15s",
        whiteSpace: "nowrap",
      }}
    >
      <span style={{ fontSize: 16 }}>{sektor.icon}</span>
      {sektor.label}
    </button>
  );
}

function SkrivIndikator() {
  return (
    <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 16 }}>
      <div style={{
        background: "#FFF", border: "1px solid #E5E7EB",
        padding: "14px 18px", borderRadius: "16px 16px 16px 4px",
        display: "flex", alignItems: "center", gap: 8,
        fontSize: 13, color: "#9CA3AF",
        boxShadow: "0 1px 3px rgba(0,0,0,0.04)"
      }}>
        <div style={{
          width: 8, height: 8, borderRadius: "50%", background: HK_ACCENT,
          animation: "spin 1s linear infinite",
          border: `2px solid ${HK_LIGHT}`,
          borderTopColor: HK_ACCENT,
        }} />
        Henter svar...
      </div>
    </div>
  );
}

// ── Hovedapplikation ──────────────────────────────────────────────
function TalMedDinOverenskomst() {
  const [valgtSektor, setValgtSektor]   = React.useState(null);
  const [inputTekst, setInputTekst]     = React.useState("");
  const [samtale, setSamtale]           = React.useState([]);
  const [loading, setLoading]           = React.useState(false);
  const inputRef  = React.useRef(null);
  const bundenRef = React.useRef(null);

  React.useEffect(() => {
    if (valgtSektor && inputRef.current) inputRef.current.focus();
  }, [valgtSektor]);

  React.useEffect(() => {
    if (bundenRef.current) bundenRef.current.scrollIntoView({ behavior: "smooth" });
  }, [samtale, loading]);

  async function handleSend(tekst) {
    const query = tekst || inputTekst;
    if (!query.trim() || !valgtSektor || loading) return;

    const nySamtale = [...samtale, { type: "bruger", tekst: query }];
    setSamtale(nySamtale);
    setInputTekst("");
    setLoading(true);

    try {
      // Konverter samtalens historik til API-format
      const messages = [];
      for (const msg of samtale) {
        if (msg.type === "bruger") {
          messages.push({ role: "user", content: msg.tekst });
        } else if (msg.type === "svar") {
          messages.push({ role: "assistant", content: msg.svar });
        }
      }
      messages.push({ role: "user", content: query });

      const sektorObj = SEKTORER.find(s => s.id === valgtSektor);
      const svar = await spørAI(messages, sektorObj);

      setSamtale([...nySamtale, {
        type: "svar",
        svar,
        tags: [sektorObj.label],
      }]);
    } catch (err) {
      setSamtale([...nySamtale, {
        type: "svar",
        svar: "Beklager, der opstod en teknisk fejl. Ring til HK på 7011 4545 for hjælp.",
        tags: ["Fejl"],
      }]);
    }

    setLoading(false);
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  }

  function vælgSektor(id) {
    setValgtSektor(id);
    setSamtale([]);
    setInputTekst("");
  }

  const sektorObj = SEKTORER.find(s => s.id === valgtSektor);

  // ── Startskærm ──
  if (!valgtSektor) {
    return (
      <div style={{
        minHeight: "100vh",
        background: `linear-gradient(160deg, ${HK_BLUE} 0%, #005A9E 100%)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "system-ui, -apple-system, sans-serif", padding: 20
      }}>
        <div style={{ textAlign: "center", color: "#FFF", maxWidth: 480 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📖</div>
          <h1 style={{ fontSize: 30, fontWeight: 700, margin: "0 0 10px" }}>Tal med din overenskomst</h1>
          <p style={{ fontSize: 15, opacity: 0.8, lineHeight: 1.6, marginBottom: 32 }}>
            Stil et spørgsmål i hverdagssprog og få et rigtigt AI-svar — uden at læse 80 sider.
          </p>
          <div style={{ fontSize: 13, opacity: 0.5, marginBottom: 14 }}>Vælg din sektor for at starte</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
            {SEKTORER.map(s => (
              <button
                key={s.id}
                onClick={() => vælgSektor(s.id)}
                style={{
                  padding: "14px 18px",
                  background: "rgba(255,255,255,0.1)",
                  border: "1px solid rgba(255,255,255,0.2)",
                  borderRadius: 14, color: "#FFF", cursor: "pointer",
                  fontFamily: "inherit", fontSize: 13, textAlign: "center",
                  transition: "all 0.2s", minWidth: 130,
                }}
                onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.2)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.1)"; }}
              >
                <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
                <div style={{ fontWeight: 600 }}>{s.label}</div>
                <div style={{ fontSize: 11, opacity: 0.6, marginTop: 2 }}>{s.desc}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── Chat-skærm ──
  return (
    <div style={{
      minHeight: "100vh", background: "#F3F4F6",
      fontFamily: "system-ui, -apple-system, sans-serif",
      display: "flex", flexDirection: "column"
    }}>
      {/* Header */}
      <div style={{
        background: HK_BLUE, color: "#FFF", padding: "10px 20px",
        display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>📖</span>
          <span style={{ fontWeight: 700, fontSize: 15 }}>Tal med din overenskomst</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {SEKTORER.map(s => (
            <SektorPille key={s.id} sektor={s} selected={valgtSektor === s.id} onClick={() => vælgSektor(s.id)} />
          ))}
        </div>
      </div>

      {/* Samtale */}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
        <div style={{ maxWidth: 680, margin: "0 auto" }}>

          {/* Velkomst + eksempler */}
          {samtale.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 0 20px" }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>{sektorObj.icon}</div>
              <h2 style={{ fontSize: 20, color: "#1A1A2E", fontWeight: 600, margin: "0 0 6px" }}>
                {sektorObj.label}
              </h2>
              <p style={{ fontSize: 14, color: "#6B7280", margin: "0 0 24px" }}>
                Stil et spørgsmål om din overenskomst nedenfor.
              </p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
                {(EKSEMPLER[valgtSektor] || []).map((ex, i) => (
                  <button
                    key={i}
                    onClick={() => handleSend(ex)}
                    style={{
                      padding: "8px 14px", background: "#FFF",
                      border: "1px solid #E5E7EB", borderRadius: 20,
                      fontSize: 13, color: HK_ACCENT, cursor: "pointer",
                      fontFamily: "inherit", transition: "all 0.15s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = HK_LIGHT; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "#FFF"; }}
                  >
                    {ex}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Beskeder */}
          {samtale.map((msg, i) => (
            <div key={i} style={{ marginBottom: 16 }}>
              {msg.type === "bruger" ? (
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <div style={{
                    background: HK_ACCENT, color: "#FFF",
                    padding: "10px 16px", borderRadius: "16px 16px 4px 16px",
                    maxWidth: "75%", fontSize: 14, lineHeight: 1.5
                  }}>
                    {msg.tekst}
                  </div>
                </div>
              ) : (
                <div style={{ display: "flex", justifyContent: "flex-start" }}>
                  <div style={{
                    background: "#FFF", border: "1px solid #E5E7EB",
                    padding: "16px 18px", borderRadius: "16px 16px 16px 4px",
                    maxWidth: "85%", boxShadow: "0 1px 3px rgba(0,0,0,0.04)"
                  }}>
                    <p style={{ margin: 0, fontSize: 14, color: "#1F2937", lineHeight: 1.7 }}>
                      {msg.svar}
                    </p>
                    {msg.tags && msg.tags.length > 0 && (
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10 }}>
                        {msg.tags.map((tag, j) => (
                          <span key={j} style={{
                            fontSize: 10, background: `${HK_ACCENT}10`, color: HK_ACCENT,
                            padding: "2px 8px", borderRadius: 10, fontWeight: 600
                          }}>
                            {tag}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          ))}

          {loading && <SkrivIndikator />}
          <div ref={bundenRef} />
        </div>
      </div>

      {/* Inputfelt */}
      <div style={{ borderTop: "1px solid #E5E7EB", background: "#FFF", padding: "12px 16px", flexShrink: 0 }}>
        <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", gap: 10, alignItems: "center" }}>
          <input
            ref={inputRef}
            type="text"
            value={inputTekst}
            onChange={e => setInputTekst(e.target.value)}
            onKeyDown={handleKeyDown}
            disabled={loading}
            placeholder={loading ? "Henter svar..." : "Stil et spørgsmål om din overenskomst..."}
            style={{
              flex: 1, padding: "12px 16px",
              border: "1px solid #D1D5DB", borderRadius: 12,
              fontSize: 14, fontFamily: "inherit", outline: "none",
              background: loading ? "#F9FAFB" : "#FFF",
            }}
          />
          <button
            onClick={() => handleSend()}
            disabled={!inputTekst.trim() || loading}
            style={{
              padding: "12px 20px",
              background: (inputTekst.trim() && !loading) ? HK_ACCENT : "#D1D5DB",
              color: "#FFF", border: "none", borderRadius: 12,
              fontSize: 14, fontWeight: 600,
              cursor: (inputTekst.trim() && !loading) ? "pointer" : "default",
              fontFamily: "inherit", whiteSpace: "nowrap",
              transition: "background 0.2s",
            }}
          >
            {loading ? "..." : "Spørg →"}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TalMedDinOverenskomst));
</script>
</body>
</html>
