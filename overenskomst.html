          svar: "6 ugers ferie: 5 uger efter ferieloven plus 1 ekstra uge via overenskomsten. Særlig feriegodtgørelse på 1,5% (højere end lovens minimum). Nyansatte har ret til betalt ferie allerede i de første to fulde ferieperioder.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["barsel", "gravid", "barselsorlov", "fødsel", "termin"],
          spørgsmål: "Hvad har jeg ret til under barsel?",
          svar: "Graviditetsorlov med fuld løn fra 6 uger før termin. 2 ugers fædre-/medforælderorlov med fuld løn. Øremærkede barselsrettigheder med løn ud over funktionærloven. Pension optjenes under hele barselsperioden.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["syg", "sygdom", "sygedag"],
          spørgsmål: "Hvad er mine rettigheder ved sygdom?",
          svar: "Fuld løn under sygdom fra første fraværsdag. Ved langvarig sygdom er der mulighed for delvis tilbagevenden og tilpassede opgaver.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["langvarig sygdom", "længere tid syg", "syg i lang tid", "kronisk", "operation", "indlæggelse", "sygemeldt længe", "mulighedserklæring"],
          spørgsmål: "Hvad sker der, hvis jeg er syg i længere tid?",
          svar: "Som statsansat har du ret til fuld løn under sygdom. Ved langvarig sygdom er der mulighed for delvis tilbagevenden med tilpassede opgaver. Din leder kan indkalde til sygefraværssamtale og I kan lave en mulighedserklæring sammen. Kontakt HK tidligt i forløbet, så vi kan hjælpe dig med at sikre dine rettigheder gennem hele processen.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["barn", "barns sygedag", "barn syg", "omsorgsdage"],
          spørgsmål: "Har jeg ret til fri når mit barn er sygt?",
          svar: "Ja. Ret til tjenestefrihed med løn på barnets 1. og 2. sygedag. Omsorgsdage for forældre med børn under 7 år. Mulighed for fleksibel tilrettelæggelse ved barns sygdom.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["opsigelse", "fyret", "opsagt"],
          spørgsmål: "Hvad er mit opsigelsesvarsel?",
          svar: "Opsigelsesvarsel følger funktionærloven: 1-6 måneder afhængigt af anciennitet. Afskedigelse skal være sagligt begrundet. Der er særlige klagemuligheder i staten. Kontakt HK straks.",
          tags: ["Funktionærloven", "Statslig overenskomst"] },

        { nøgleord: ["uddannelse", "kursus", "kompetence"],
          spørgsmål: "Hvad er mine rettigheder til uddannelse?",
          svar: "Ret til kompetenceudvikling som led i ansættelsen. Den statslige kompetencefond yder tilskud til kurser og uddannelse. Gratis kurser via HK's læringsplatform Upgrade.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["pension", "pensionsbidrag"],
          spørgsmål: "Hvor meget går til pension?",
          svar: "Pensionsbidraget er typisk 15-18% (eget bidrag + arbejdsgiverbidrag). Indbetales typisk til Sampension. Inkluderer gruppeliv og forsikring ved invaliditet.",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["arbejdstid", "timer", "flextid", "overarbejde"],
          spørgsmål: "Hvad er reglerne for arbejdstid?",
          svar: "Normal ugentlig arbejdstid: 37 timer. Flekstid er udbredt i staten. Overarbejde kompenseres med afspadsering (time for time plus 50% de første 3 timer, derefter 100%).",
          tags: ["Statslig overenskomst"] },

        { nøgleord: ["syg ægtefælle", "syg kone", "syg mand", "syg partner", "kræft", "alvorlig sygdom", "nærtstående", "pårørende", "omsorgsorlov", "pasning", "pleje", "behandlingsforløb", "kræftbehandling", "terminal", "hospice", "ledsage"],
          spørgsmål: "Hvad er mine rettigheder, hvis min ægtefælle eller nærtstående bliver alvorligt syg?",
          svar: "Du har ret til tjenestefrihed ved akut sygdom i familien. Omsorgsloven giver dig ret til op til 5 dages omsorgsorlov om året til at yde omsorg eller støtte til en nærtstående med alvorlig sygdom. Du kan desuden søge kommunen om orlov til pasning af nærtstående med alvorlig sygdom (servicelovens §118), som giver ret til plejevederlag. Som statsansat kan du også tale med din leder om fleksibel tilrettelæggelse i perioden.",
          tags: ["Statslig overenskomst", "Omsorgsloven", "Serviceloven §118"] },
      ],
    };

    // ── Søgemotor ─────────────────────────────────────────────────────
    function søgISvar(sektor, forespørgsel) {
      const tekst = forespørgsel.toLowerCase();
      const sektorData = QA[sektor];
      if (!sektorData) return [];

      const scorede = sektorData.map((qa) => {
        let score = 0;
        for (const nøgle of qa.nøgleord) {
          if (tekst.includes(nøgle.toLowerCase())) {
            score += nøgle.length;
          }
        }
        const spørgsmålOrd = qa.spørgsmål.toLowerCase().split(/\s+/);
        for (const ord of tekst.split(/\s+/)) {
          if (ord.length > 2 && spørgsmålOrd.includes(ord)) score += 1;
        }
        return { ...qa, score };
      });

      return scorede.filter((q) => q.score > 0).sort((a, b) => b.score - a.score);
    }

    // ── Komponenter ───────────────────────────────────────────────────
    function SektorPille({ sektor, selected, onClick }) {
      return (
        <button
          onClick={onClick}
          style={{
            display: "flex",
            alignItems: "center",
            gap: 8,
            padding: "8px 16px",
            border: selected ? `2px solid ${HK_ACCENT}` : "1px solid #D1D5DB",
            borderRadius: 30,
            background: selected ? HK_LIGHT : "#FFF",
            cursor: "pointer",
            fontSize: 13,
            fontWeight: selected ? 600 : 400,
            color: selected ? HK_BLUE : "#374151",
            fontFamily: "system-ui, sans-serif",
            transition: "all 0.15s",
            whiteSpace: "nowrap",
          }}
        >
          <span style={{ fontSize: 16 }}>{sektor.icon}</span>
          {sektor.label}
        </button>
      );
    }

    // ── Hovedapplikation ──────────────────────────────────────────────
    function TalMedDinOverenskomst() {
      const [valgtSektor, setValgtSektor] = React.useState(null);
      const [inputTekst, setInputTekst] = React.useState("");
      const [samtale, setSamtale] = React.useState([]);
      const [forslag, setForslag] = React.useState([]);
      const inputRef = React.useRef(null);
      const bundenRef = React.useRef(null);

      React.useEffect(() => {
        if (valgtSektor && inputRef.current) inputRef.current.focus();
      }, [valgtSektor]);

      React.useEffect(() => {
        if (bundenRef.current) bundenRef.current.scrollIntoView({ behavior: "smooth" });
      }, [samtale]);

      React.useEffect(() => {
        if (!valgtSektor || inputTekst.trim().length < 2) {
          setForslag([]);
          return;
        }
        const resultater = søgISvar(valgtSektor, inputTekst);
        setForslag(resultater.slice(0, 3));
      }, [inputTekst, valgtSektor]);

      function handleSend(tekst) {
        const query = tekst || inputTekst;
        if (!query.trim() || !valgtSektor) return;

        const resultater = søgISvar(valgtSektor, query);

        const nySamtale = [
          ...samtale,
          { type: "bruger", tekst: query },
        ];

        if (resultater.length > 0) {
          nySamtale.push({
            type: "svar",
            spørgsmål: resultater[0].spørgsmål,
            svar: resultater[0].svar,
            tags: resultater[0].tags,
            relaterede: resultater.slice(1, 3),
          });
        } else {
          nySamtale.push({
            type: "svar",
            svar: "Det har jeg desværre ikke et godt svar på her. Din situation lyder som noget der fortjener en personlig samtale med en af HK's rådgivere, som kan se på netop dine vilkår. Ring til HK på 7011 4545, så hjælper de dig videre.",
            tags: ["Kontakt HK"],
            relaterede: [],
          });
        }

        setSamtale(nySamtale);
        setInputTekst("");
        setForslag([]);
      }

      function handleKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }

      function vælgSektor(id) {
        setValgtSektor(id);
        setSamtale([]);
        setInputTekst("");
        setForslag([]);
      }

      const sektorObj = SEKTORER.find((s) => s.id === valgtSektor);

      if (!valgtSektor) {
        return (
          <div style={{ minHeight: "100vh", background: `linear-gradient(160deg, ${HK_BLUE} 0%, #005A9E 100%)`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "system-ui, -apple-system, sans-serif", padding: 20 }}>
            <div style={{ textAlign: "center", color: "#FFF", maxWidth: 480 }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>📖</div>
              <h1 style={{ fontSize: 30, fontWeight: 700, margin: "0 0 10px" }}>Tal med din overenskomst</h1>
              <p style={{ fontSize: 15, opacity: 0.8, lineHeight: 1.6, marginBottom: 32 }}>
                Stil et spørgsmål i hverdagssprog. Få svar fra din overenskomst uden at læse 80 sider.
              </p>
              <div style={{ fontSize: 13, opacity: 0.5, marginBottom: 14 }}>Vælg din sektor for at starte</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
                {SEKTORER.map((s) => (
                  <button
                    key={s.id}
                    onClick={() => vælgSektor(s.id)}
                    style={{
                      padding: "14px 18px",
                      background: "rgba(255,255,255,0.1)",
                      border: "1px solid rgba(255,255,255,0.2)",
                      borderRadius: 14,
                      color: "#FFF",
                      cursor: "pointer",
                      fontFamily: "inherit",
                      fontSize: 13,
                      textAlign: "center",
                      transition: "all 0.2s",
                      minWidth: 130,
                    }}
                    onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.2)"; }}
                    onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.1)"; }}
                  >
                    <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
                    <div style={{ fontWeight: 600 }}>{s.label}</div>
                    <div style={{ fontSize: 11, opacity: 0.6, marginTop: 2 }}>{s.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", background: "#F3F4F6", fontFamily: "system-ui, -apple-system, sans-serif", display: "flex", flexDirection: "column" }}>
          <div style={{ background: HK_BLUE, color: "#FFF", padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 18 }}>📖</span>
              <span style={{ fontWeight: 700, fontSize: 15 }}>Tal med din overenskomst</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {SEKTORER.map((s) => (
                <SektorPille key={s.id} sektor={s} selected={valgtSektor === s.id} onClick={() => vælgSektor(s.id)} />
              ))}
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              {samtale.length === 0 && (
                <div style={{ textAlign: "center", padding: "40px 0 20px" }}>
                  <div style={{ fontSize: 36, marginBottom: 8 }}>{sektorObj.icon}</div>
                  <h2 style={{ fontSize: 20, color: "#1A1A2E", fontWeight: 600, margin: "0 0 6px" }}>
                    {sektorObj.label}
                  </h2>
                  <p style={{ fontSize: 14, color: "#6B7280", margin: "0 0 24px" }}>
                    Stil et spørgsmål om din overenskomst nedenfor.
                  </p>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
                    {["Har jeg ret til fri når mit barn er sygt?", "Hvad er mit opsigelsesvarsel?", "Min kone skal i kræftbehandling. Hvad er mine rettigheder?", "Hvad er Fritvalgskontoen?"].map((ex, i) => (
                      <button
                        key={i}
                        onClick={() => handleSend(ex)}
                        style={{
                          padding: "8px 14px",
                          background: "#FFF",
                          border: "1px solid #E5E7EB",
                          borderRadius: 20,
                          fontSize: 13,
                          color: HK_ACCENT,
                          cursor: "pointer",
                          fontFamily: "inherit",
                          transition: "all 0.15s",
                        }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = HK_LIGHT; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = "#FFF"; }}
                      >
                        {ex}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {samtale.map((msg, i) => (
                <div key={i} style={{ marginBottom: 16 }}>
                  {msg.type === "bruger" ? (
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <div style={{ background: HK_ACCENT, color: "#FFF", padding: "10px 16px", borderRadius: "16px 16px 4px 16px", maxWidth: "75%", fontSize: 14, lineHeight: 1.5 }}>
                        {msg.tekst}
                      </div>
                    </div>
                  ) : (
                    <div style={{ display: "flex", justifyContent: "flex-start" }}>
                      <div style={{ background: "#FFF", border: "1px solid #E5E7EB", padding: "16px 18px", borderRadius: "16px 16px 16px 4px", maxWidth: "85%", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                        {msg.spørgsmål && (
                          <div style={{ fontSize: 12, color: HK_ACCENT, fontWeight: 600, marginBottom: 6 }}>
                            {msg.spørgsmål}
                          </div>
                        )}
                        <p style={{ margin: 0, fontSize: 14, color: "#1F2937", lineHeight: 1.7 }}>{msg.svar}</p>
                        {msg.tags && msg.tags.length > 0 && (
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10 }}>
                            {msg.tags.map((tag, j) => (
                              <span key={j} style={{ fontSize: 10, background: `${HK_ACCENT}10`, color: HK_ACCENT, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>
                                {tag}
                              </span>
                            ))}
                          </div>
                        )}
                        {msg.relaterede && msg.relaterede.length > 0 && (
                          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #F3F4F6" }}>
                            <div style={{ fontSize: 11, color: "#9CA3AF", marginBottom: 6 }}>Relaterede spørgsmål:</div>
                            {msg.relaterede.map((rel, j) => (
                              <button
                                key={j}
                                onClick={() => handleSend(rel.spørgsmål)}
                                style={{
                                  display: "block",
                                  background: "none",
                                  border: "none",
                                  padding: "4px 0",
                                  fontSize: 13,
                                  color: HK_ACCENT,
                                  cursor: "pointer",
                                  fontFamily: "inherit",
                                  textAlign: "left",
                                }}
                              >
                                → {rel.spørgsmål}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <div ref={bundenRef} />
            </div>
          </div>

          <div style={{ borderTop: "1px solid #E5E7EB", background: "#FFF", padding: "12px 16px", flexShrink: 0 }}>
            <div style={{ maxWidth: 680, margin: "0 auto", position: "relative" }}>
              {forslag.length > 0 && (
                <div style={{ position: "absolute", bottom: "100%", left: 0, right: 0, background: "#FFF", border: "1px solid #E5E7EB", borderRadius: "12px 12px 0 0", boxShadow: "0 -4px 12px rgba(0,0,0,0.06)", overflow: "hidden", marginBottom: -1 }}>
                  {forslag.map((f, i) => (
                    <button
                      key={i}
                      onClick={() => handleSend(f.spørgsmål)}
                      style={{
                        display: "block",
                        width: "100%",
                        padding: "10px 16px",
                        background: "none",
                        border: "none",
                        borderBottom: i < forslag.length - 1 ? "1px solid #F3F4F6" : "none",
                        fontSize: 13,
                        color: "#374151",
                        cursor: "pointer",
                        fontFamily: "inherit",
                        textAlign: "left",
                      }}
                      onMouseEnter={(e) => { e.currentTarget.style.background = "#F9FAFB"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.background = "none"; }}
                    >
                      <span style={{ color: HK_ACCENT, marginRight: 8 }}>→</span>
                      {f.spørgsmål}
                    </button>
                  ))}
                </div>
              )}

              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <input
                  ref={inputRef}
                  type="text"
                  value={inputTekst}
                  onChange={(e) => setInputTekst(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Stil et spørgsmål om din overenskomst..."
                  style={{
                    flex: 1,
                    padding: "12px 16px",
                    border: "1px solid #D1D5DB",
                    borderRadius: 12,
                    fontSize: 14,
                    fontFamily: "inherit",
                    outline: "none",
                  }}
                />
                <button
                  onClick={() => handleSend()}
                  disabled={!inputTekst.trim()}
                  style={{
                    padding: "12px 20px",
                    background: inputTekst.trim() ? HK_ACCENT : "#D1D5DB",
                    color: "#FFF",
                    border: "none",
                    borderRadius: 12,
                    fontSize: 14,
                    fontWeight: 600,
                    cursor: inputTekst.trim() ? "pointer" : "default",
                    fontFamily: "inherit",
                    whiteSpace: "nowrap",
                  }}
                >
                  Spørg →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TalMedDinOverenskomst));
  </script>
</body>
</html>
